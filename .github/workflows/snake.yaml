name: Generate Snake

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake (multiple styles)
        uses: Platane/snk@v3
        with:
          github_user_name: vinitdalal05032004-bit
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/neon.gif?color_snake=00F7FF&color_dots=#0d1117,#0e4429,#006d32,#26a641,#39d353
            dist/matrix.gif?color_snake=00ff00&color_dots=#000000,#013220,#026440,#39ff14,#7fff00
            dist/fire.gif?color_snake=ff4500&color_dots=#1a0000,#660000,#cc0000,#ff4500,#ffae42

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
